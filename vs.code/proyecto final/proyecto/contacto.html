<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Frutas manolo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="images/svg" href="images/icon.svg">
    <link rel="stylesheet" type="text/css" href="CSS/main.css">
    <script src="js/main.js" defer></script>

</head>

<body>



    <!-- Header de la  página -->
    <header>

        <!-- Título -->
        <h1 class="ext-header-title title">Formulario de Datos</h1>

        <!-- Volver a la página de inicio -->
        <div class="ext-header-box">
            <ul>
                <li><a href="index.html">Volver</a></li>
            </ul>
        </div>

    </header>



    <!-- Main de la página -->



    <main>

        <form method="post" action="no.txt">
            <!-- Nombre del formulario -->
            <div class="form-title-box">
                <span class="section-title">Contacto</span>
            </div>
            <!-- El formulario -->
            <div class="form-content-box">
                <!-- Insertar datos -->
                <div class="form-boxes">
                    <label for="phone">Teléfono</label>
                    <input type="text" id="phone" placeholder="*escribe">
                </div>
                <div class="form-boxes">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="*escribe">
                </div>
                <!-- Enviar formulario (java script) -->
                <button title="Enviar" class="form-button form-boxes" type="reset">Enviar</button>
                <!-- El formulario se ha enviado correctamente -->
                <div class="form-message-box">
                    <button title="Ok" type="button" class="form-message">...</button>
                </div>

            </div>
        </form>



    </main>



    <!-- The page footer -->



    <footer>
        <!-- Deutsch text, weil es sehr shôn ist -->
        <!-- Típico texto de los footer escrito en alemán (el dueño de la página se alemán [Deutschland]) -->
        <div>
            <p>Ludwig van Beethoven ist der beste</p>
        </div>
    </footer>

</body>

</html>
