<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Frutas manolo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="images/svg" href="images/icon.svg">
    <link rel="stylesheet" type="text/css" href="CSS/main.css">
    <script src="js/main.js" defer></script>

</head>

<body>



    <!-- Header de la  página  -->

    <header>

        <!-- Título -->
        <h1 class="ext-header-title title">Formulario de Datos</h1>

        <!-- Volver a la página de inicio -->
        <div class="ext-header-box">
            <ul>
                <li><a href="index.html">Volver</a></li>
            </ul>
        </div>

    </header>



    <!-- Main de la página -->



    <main>
        <!-- Formularios -->
        <!-- Formulario registrarse -->
        <form method="post" action="no.txt">
            <!-- Registrarse (activado por defecto) -->
            <div class="form-title-box">
                <span class="section-title">Registrarse</span>
            </div>
            <div class="form-content-box">
                <!-- Insertar datos -->
                <div class="form-boxes">
                    <label for="user">Nombre usuario</label>
                    <input type="text" id="user" placeholder="*escribe">
                </div>
                <div class="form-boxes">
                    <label for="pin">Contraseña</label>
                    <input type="password" id="pin" placeholder="*escribe">
                </div>
                <div class="form-boxes">
                    <label for="pin-repeat">Repetir contraseña</label>
                    <input type="password" id="pin-repeat" placeholder="*escribe">
                </div>
                <!-- Enviar formulario (java script) -->
                <button title="Enviar" class="form-button form-boxes" type="button">Enviar</button>
                <!-- El formulario se ha enviado correctamente -->
                <div class="form-message-box">
                    <button title="Ok" type="button" class="form-message">...</button>
                </div>
            </div>
        </form>
        <!-- Formulario iniciar sesión -->
        <form method="post" action="no.txt">
            <!-- Iniciar sesión -->
            <div class="form-title-box">
                <span class="section-title">Iniciar sesión</span>
            </div>
            <div class="form-content-box">
                <!-- Insertar datos -->
                <div class="form-boxes">
                    <label for="users">Nombre usuario</label>
                    <input type="text" id="users" placeholder="*escribe">
                </div>
                <div class="form-boxes">
                    <label for="pins">Contraseña</label>
                    <input type="password" id="pins" placeholder="*escribe">
                </div>
                <!-- Enviar formulario (java script) -->
                <button title="Enviar" class="form-button form-boxes" type="button">Enviar</button>
                <!-- El formulario se ha enviado correctamente -->
                <div class="form-message-box">
                    <button title="Ok" type="button" class="form-message">...</button>
                </div>
            </div>
        </form>


    </main>



    <!-- The page footer -->



    <footer>
        <!-- Deutsch text, weil es sehr shön ist -->
        <!-- Típico texto de los footer escrito en alemán (el dueño de la página se alemán [Deutschland]) -->
        <div>
            <p>Ludwig van Beethoven ist der beste</p>
        </div>
    </footer>

</body>

</html>
