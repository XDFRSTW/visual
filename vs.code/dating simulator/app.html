<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Cursed Sakura Highschool Dating Simulator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="images/png" href="images/ruga.png">
    <link rel="stylesheet" type="text/css" href="CSS/main.css">
    <script src="js/main.js" defer></script>

</head>

<body>

    <!-- sobrecarga de la sala -->
    <span id="sala" style="display: none; position: absolute;">-1</span>

    <!-- background -->
    <img id="mainBack" class="background" src="images/backgrounds/menu/mainBack.png">

    <!-- dialogue -->
    <div id="dialogue" class="dialogue-box">
        <span id="name" class="dialogue-name">Thanos</span>
        <p id="text" class="dialogue-text">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Possimus est saepe
            blanditiis
            voluptatem sequi nulla ratione a officia, sint molestiae! Similique explicabo officiis sequi in laudantium
            illo, blanditiis necessitatibus totam!</p>
        <!-- options -->
        <div style="display: flex;">
            <span id="option1" class="options">option1</span>
            <span id="option2" class="options">option2</span>
            <span id="option3" class="options">option3</span>
            <span id="option4" class="options">option4</span>
        </div>
        <!-- next botton -->
        <span id="next" class="next">next</span>
    </div>

    <!-- characters -->
    <img id="cody" class="characters" src="images/characters/cody.png">
    <img id="dog" class="characters" src="images/characters/dog.png">
    <img id="polter" class="characters" src="images/characters/Polter.png">
    <!-- png falso de polterghast -->
    <img id="polter-fake" class="characters" src="images/characters/Polter.png">

     <!-- exit button -->
    <div class="menu-principal-box">
        <button><a id="menu-principal" class="menu-principal" href="menu.html">Menu</a></button>
    </div>

</body>

</html>
