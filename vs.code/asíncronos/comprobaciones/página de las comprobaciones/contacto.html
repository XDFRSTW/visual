<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>El hoyo de la rata: Noticias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <script src="js/main.js" defer></script>
</head>

<body>
    <!-- header -->
    <header class="header">
        <h1 class="header-title">Noticias de Ratas</h1>
        <nav>
           <ul>
                <li><a class="link" href="#form">Formulario</a></li>
           </ul>
        </nav>
        <div class="header-lupa">
            <a href="https://www.bing.com/ck/a?!&&p=a713c2bbfad0e19b53b1bb176ed1086cf489187302ae15a3c07ac465fac6c0dfJmltdHM9MTc2MzMzNzYwMA&ptn=3&ver=2&hsh=4&fclid=1dc8b780-361d-6a08-3b00-a10537156b7c&psq=google&u=a1aHR0cHM6Ly93d3cuZ29vZ2xlLmNvbS8"
                target="_blank" rel="noopener"><img class="header-lupa__lupa" src="images/lupa.png" alt="buscar" title="lupa" loading="lazy"></a>
        </div>
        
    </header>

    <!-- main de las páginas extras, con un formulario -->
     <main>
        <section>
           
            <div class="externa-image-container">
                    <picture>
                        <source srcset="images/.webp" type="images/webp">
                        <img class="externa-image" src="images/rat-rat.png" alt="rata" title="hora de ser una rata" loading="lazy">
                    </picture>
            </div>
             <h2 class="form-title">Contacto</h2>
            <form class="form" method="post" action="hola.txt">
                
                <datalist id="list">
                    <option value="Adolfa"></option>
                    <option value="Azofaifo"></option>
                    <option value="Rodrigo"></option>
                    <option value="Pepi"></option>
                    <option value="Remi"></option>
                    <option value="Bruno"></option>
                    <option value="Rat King"></option>
                    <option value="Rodofreda"></option>
                    <option value="Gollum"></option>
                </datalist>

                <label class="form-label" for="name">Rata a contactar :</label>               
                <input list="list" class="form-input" id="name" type="text" name="name" placeholder="escribe*" required>
                <br>
                <label class="form-label" for="email">TU email :</label>
                <input class="form-input" id="email" type="email" name="email" placeholder="escribe*" required>
                <br>
                <label class="form-label" for="img">Imagen de la rata afiliada :</label>
                <input class="form-input" id="img" type="file" name="img" >
                <br>
            
                <button class="rat-button" type="submit"><img src="images/icon.png" alt="rata" title="rata del correo"></button>

            </form>

        </section>
     </main>

  
     <!-- pie de página -->
    <footer class="footer">
        <div class="footer-container">
            <ul class="footer-link">
                <li><a style="color: black; text-decoration: none;" href="login.html">Iniciar sesión</a></li>
                <li><a style="color: black; text-decoration: none;" href="registrarse.html">Registrarse</a></li>
                <li><a style="color: black; text-decoration: none;" href="index.html">Inicio</a></li>
            </ul>
        </div>
    </footer>

</body>

</html>
